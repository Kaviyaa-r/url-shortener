<!DOCTYPE html>
<!-- Set the document language to English and force dark mode using dark class -->
<html lang="en" class="dark">
  <head>
    <!-- Configure character encoding for text rendering -->
    <meta charset="UTF-8" />
    <!-- Configure viewport scaling for responsive display on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Set application title tag -->
    <title>SnapLink - Premium URL Shortener</title>
  </head>
  <!-- Set default body styles: dark slate background and white text colors -->
  <body class="bg-slate-900 text-white antialiased">
    <!-- Anchor element where React mounts the DOM node tree -->
    <div id="root"></div>
    <!-- Load React app starting module script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
